version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      electron-toolchain:
        patterns:
          - electron
          - electron-builder
          - electron-updater
          - electron-vite
      test-tooling:
        patterns:
          - vitest
          - '@vitest/*'
          - playwright
          - '@playwright/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
