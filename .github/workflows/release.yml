name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # 当推送 v 开头的标签时触发，如 v1.0.0
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Package for Windows
        run: npm run build:win

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: |
            out/make/zip/win32/x64/*.zip
          body: |
            ## Download

            Download the `RimWorld-Mod-Downloader-x.x.x.zip` file above.

            ## What's New

            See [CHANGELOG](./CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.version.outputs.upload_url }}
          asset_path: out/make/zip/win32/x64/*.zip
          asset_name: RimWorld-Mod-Downloader-${{ env.VERSION }}.zip
          asset_content_type: application/zip
