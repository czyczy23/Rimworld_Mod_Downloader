name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish, for example v1.1.1
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run verify:ci
        env:
          CI: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ github.run_id }}
          path: coverage/unit
          retention-days: 14

  e2e:
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run end-to-end smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Run native Electron smoke tests
        run: npm run test:e2e:electron
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report
            playwright-report-electron
            test-results
          retention-days: 14

  package-windows:
    runs-on: windows-latest
    needs:
      - quality
      - e2e
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = ''
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
          } elseif ('${{ github.event.inputs.release_tag }}') {
            $tag = '${{ github.event.inputs.release_tag }}'
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          "version=$($package.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate release tag
        if: steps.release_tag.outputs.tag != ''
        shell: pwsh
        run: |
          $expected = 'v${{ steps.package_version.outputs.version }}'
          $actual = '${{ steps.release_tag.outputs.tag }}'
          if ($actual -ne $expected) {
            throw "Release tag '$actual' must match package version '$expected'."
          }

      - name: Build application bundle
        run: npm run build:app

      - name: Check Windows signing configuration
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING: ${{ vars.WINDOWS_CODE_SIGNING || 'disabled' }}
          WINDOWS_SIGN_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGN_PUBLISHER_NAME }}
          WINDOWS_SIGN_TIMESTAMP_SERVER: ${{ vars.WINDOWS_SIGN_TIMESTAMP_SERVER }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          npm run signing:check

      - name: Package for Windows
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING: ${{ vars.WINDOWS_CODE_SIGNING || 'disabled' }}
          WINDOWS_SIGN_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGN_PUBLISHER_NAME }}
          WINDOWS_SIGN_TIMESTAMP_SERVER: ${{ vars.WINDOWS_SIGN_TIMESTAMP_SERVER }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          npm run package:win

      - name: Verify Windows signatures
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING: ${{ vars.WINDOWS_CODE_SIGNING || 'disabled' }}
          WINDOWS_SIGN_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGN_PUBLISHER_NAME }}
          WINDOWS_SIGN_TIMESTAMP_SERVER: ${{ vars.WINDOWS_SIGN_TIMESTAMP_SERVER }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          if ('${{ vars.WINDOWS_CODE_SIGNING || 'disabled' }}' -eq 'disabled') {
            npm run signing:verify
          } else {
            npm run signing:require-valid
          }

      - name: List output files
        run: |
          Get-ChildItem -Path release/ -Recurse -File | Select-Object FullName, Length

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers-${{ github.run_id }}
          path: |
            release/**/*.exe
            release/**/*.msi
            !release/**/win-unpacked/**
          retention-days: 30

      - name: Upload package metadata
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-metadata-${{ github.run_id }}
          path: |
            release/**/builder-debug.yml
            release/**/*.blockmap
            release/**/latest.yml
          retention-days: 30

      - name: Resolve previous release tag
        if: steps.release_tag.outputs.tag != ''
        id: previous_tag
        shell: pwsh
        run: |
          $current = '${{ steps.release_tag.outputs.tag }}'
          $previous = git tag --sort=-version:refname | Where-Object { $_ -and $_ -ne $current } | Select-Object -First 1
          "tag=$previous" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Render release notes
        if: steps.release_tag.outputs.tag != ''
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/render-release-notes.cjs --tag "$env:RELEASE_TAG" --previous-tag "$env:PREVIOUS_TAG" --output release-notes.md

      - name: Create or update GitHub Release
        if: steps.release_tag.outputs.tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          RELEASE_VERSION: ${{ steps.package_version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release view $env:RELEASE_TAG --repo $env:REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG `
              --repo $env:REPOSITORY `
              --title "RimWorld Mod Downloader $env:RELEASE_TAG" `
              --notes-file release-notes.md
          } else {
            gh release edit $env:RELEASE_TAG `
              --repo $env:REPOSITORY `
              --title "RimWorld Mod Downloader $env:RELEASE_TAG" `
              --notes-file release-notes.md
          }

          gh release upload $env:RELEASE_TAG `
            "release/$env:RELEASE_VERSION/RimWorld-Mod-Downloader-$env:RELEASE_VERSION-setup.exe" `
            "release/$env:RELEASE_VERSION/RimWorld-Mod-Downloader-$env:RELEASE_VERSION.msi" `
            --repo $env:REPOSITORY `
            --clobber

          # Upload latest.yml for electron-updater auto-update
          # Force-fail if missing - without it, electron-updater silently breaks.
          $latestYml = "release/$env:RELEASE_VERSION/latest.yml"
          if (-not (Test-Path $latestYml)) {
            throw "latest.yml not found at $latestYml - electron-updater auto-update would be broken."
          }
          gh release upload $env:RELEASE_TAG $latestYml --repo $env:REPOSITORY --clobber
